<!DOCTYPE html>
<html>
<head>
    <title>Manage Items</title>
</head>
<body>
    <h1>Inventory Items</h1>

    <h3>Add New Item</h3>
    <input id="name" placeholder="Item Name">
    <input id="category" placeholder="Category ID">
    <input id="qty" placeholder="Quantity">
    <input id="price" placeholder="Unit Price">
    <button onclick="addItem()">Add Item</button>

    <h2>Items List</h2>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit Price</th>
            </tr>
        </thead>
        <tbody id="items"></tbody>
    </table>

<script>
async function loadItems() {
    const res = await fetch("http://127.0.0.1:5000/items");
    const data = await res.json();

    let table = "";
    data.forEach(item => {
        table += `
        <tr>
            <td>${item.item_id}</td>
            <td>${item.item_name}</td>
            <td>${item.category_id}</td>
            <td>${item.quantity}</td>
            <td>${item.unit_price}</td>
        </tr>`;
    });
    document.getElementById("items").innerHTML = table;
}

async function addItem() {
    const item = {
        item_name: document.getElementById("name").value,
        category_id: document.getElementById("category").value,
        quantity: parseInt(document.getElementById("qty").value),
        unit_price: parseFloat(document.getElementById("price").value)
    };

    await fetch("http://127.0.0.1:5000/items", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(item)
    });

    loadItems();
}

loadItems();
</script>
</body>
</html>
