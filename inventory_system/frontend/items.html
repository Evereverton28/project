<!DOCTYPE html>
<html>
<head>
  <title>Items</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">Inventory</h2>

    <a href="index.html">
      <i class="fa-solid fa-chart-line"></i> <span>Dashboard</span>
    </a>

    <a href="items.html">
      <i class="fa-solid fa-box"></i> <span>Items</span>
    </a>

    <a href="transactions.html">
      <i class="fa-solid fa-right-left"></i> <span>Transactions</span>
    </a>

    <a href="reports.html">
      <i class="fa-solid fa-chart-pie"></i> <span>Reports</span>
    </a>

    <div class="sidebar-footer">
      <span id="userInfo"></span>
      <button id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="container">

      <h2>Inventory Items</h2>

      <!-- ADD ITEM FORM -->
      <form id="itemForm">
        <input type="text" id="item_name" placeholder="Item Name" required>
        <input type="text" id="category" placeholder="Category" required>
        <input type="number" id="quantity" placeholder="Quantity" min="1" required>
        <input type="number" id="unit_price" placeholder="Unit Price" min="0" step="0.01" required>
        <button type="submit">
          <i class="fa-solid fa-plus"></i> Add Item
        </button>
      </form>

      <!-- SEARCH -->
      <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Search items..."
        onkeyup="filterItems()"
        style="margin-bottom:15px; padding:10px; width:100%; border-radius:6px;"
      >

    <!-- TABLE -->
    <div style="width: 100%; text-align: left;">
      <h3>Items List</h3>
      <table id="itemsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="itemsTableBody"></tbody>
      </table>
    </div>

    </div>

  </main>

</div>

<!-- JS -->
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
const username = sessionStorage.getItem("username");
if (username) {
  document.getElementById("userInfo").textContent = `Logged in as: ${username}`;
}
</script>


</body>
</html>
