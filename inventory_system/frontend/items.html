<!DOCTYPE html>
<html>
<head>
  <title>Items</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Font Awesome for trash icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="items.html">Items</a>
  <a href="transactions.html">Transactions</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="container">
  <h2>Inventory Items</h2>

  <!-- Add Item Form -->
  <form id="itemForm">
    <input type="text" id="item_name" placeholder="Item Name" required>
    
    <!-- Dynamic category dropdown -->
    <input list="categoryList" id="category" placeholder="Category" required>
    <datalist id="categoryList"></datalist>

    <input type="number" id="quantity" placeholder="Quantity" min="1" required>
    <input type="number" id="unit_price" placeholder="Unit Price" min="0" step="0.01" required>
    <button type="submit">Add Item</button>
  </form>

  <h3>Items List</h3>
  <table id="itemsTable" border="1" cellspacing="0" cellpadding="8">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="itemsTableBody"></tbody>
  </table>
</div>

<script src="js/app.js"></script>
</body>
</html>
