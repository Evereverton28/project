<!DOCTYPE html>
<html>
<head>
  <title>Transactions</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <h2 class="logo">Inventory</h2>

    <a href="index.html"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></a>
    <a href="items.html"><i class="fa-solid fa-box"></i> <span>Items</span></a>
    <a href="transactions.html"><i class="fa-solid fa-right-left"></i> <span>Transactions</span></a>
    <a href="reports.html"><i class="fa-solid fa-chart-pie"></i> <span>Reports</span></a>

    <div class="sidebar-footer">
      <span id="userInfo"></span>
      <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </aside>

  <main class="main-content">

    <div class="container" style="width: 100%; text-align: left;">
      <h2>Record Transaction</h2>

      <form id="transactionForm">
        <select id="itemSelect" required></select>

        <select id="type" required>
          <option value="IN">⬆ Stock In</option>
          <option value="OUT">⬇ Stock Out</option>
        </select>

        <input type="number" id="quantity" placeholder="Quantity" required>

        <button type="submit">
          <i class="fa-solid fa-plus"></i> Submit
        </button>
      </form>

      <h3>Transaction History</h3>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Type</th>
            <th>Quantity</th>
            <th>Date</th>
          </tr>
        </thead>

        <tbody id="transactionTable"></tbody>
      </table>
    </div>

  </main>

</div>

<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>

<script>
const username = sessionStorage.getItem("username");
if (username) {
  document.getElementById("userInfo").textContent = `Logged in as: ${username}`;
}
</script>


</body>
</html>
